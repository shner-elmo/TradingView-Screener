name: Test
on:
  pull_request:
    branches:
      - "*"
  push:
    branches-ignore:
      - docs
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] #windows-latest
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-caching: true

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest
