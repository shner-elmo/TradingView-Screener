<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Query Tester</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <style>
    body { overflow-x: hidden; }

    .chip-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      min-height: 2.4rem;
      padding: 0.4rem;
      border: 1px solid var(--pico-form-element-border-color);
      border-radius: var(--pico-border-radius);
      background: var(--pico-form-element-background-color);
      cursor: text;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.1rem 0.5rem;
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
      border-radius: 999px;
      font-size: 0.85em;
      white-space: nowrap;
    }
    .chip button {
      all: unset;
      cursor: pointer;
      font-size: 1em;
      line-height: 1;
      opacity: 0.7;
    }
    .chip button:hover { opacity: 1; }

    .chip-input {
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      background: transparent !important;
      padding: 0.1rem 0.2rem !important;
      margin: 0 !important;
      min-width: 10rem;
      flex: 1;
      font-size: 0.9em;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .filter-row select,
    .filter-row input {
      margin-bottom: 0;
    }
    .filter-row .remove-btn {
      padding: 0.4rem 0.7rem;
      font-size: 0.9em;
    }

    .tab-bar {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }
    .tab-bar button {
      padding: 0.3rem 0.9rem;
      font-size: 0.9em;
    }
    .tab-bar button[aria-selected="true"] {
      background: var(--pico-primary);
      color: var(--pico-primary-inverse);
      border-color: var(--pico-primary);
    }

    .code-wrapper {
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.2rem 0.6rem;
      font-size: 0.8em;
      z-index: 1;
    }
    pre {
      margin-top: 0;
      border-radius: var(--pico-border-radius);
    }
    pre code.hljs {
      border-radius: var(--pico-border-radius);
    }

    #results-table-wrapper {
      overflow-x: auto;
    }
    #results-table {
      font-size: 0.85em;
    }

    .error-box {
      padding: 1rem;
      border: 1px solid var(--pico-del-color);
      border-radius: var(--pico-border-radius);
      color: var(--pico-del-color);
      background: color-mix(in srgb, var(--pico-del-color) 10%, transparent);
    }

    section { margin-bottom: 1.5rem; }
    h3 { margin-bottom: 0.6rem; }
    small.hint { color: var(--pico-muted-color); }
  </style>
</head>
<body>
<main class="container">
  <h2>Query Tester</h2>
  <p><small class="hint">Build a TradingView screener query, generate the Python code, and optionally run it live.</small></p>

  <!-- Market -->
  <section>
    <h3>Market</h3>
    <div role="group" id="market-buttons">
      <button class="primary" data-market="america" onclick="selectMarket('america')">Stocks</button>
      <button class="secondary" data-market="crypto" onclick="selectMarket('crypto')">Crypto</button>
      <button class="secondary" data-market="forex" onclick="selectMarket('forex')">Forex</button>
      <button class="secondary" data-market="coin" onclick="selectMarket('coin')">Coin</button>
      <button class="secondary" data-market="cfd" onclick="selectMarket('cfd')">CFD</button>
      <button class="secondary" data-market="futures" onclick="selectMarket('futures')">Futures</button>
      <button class="secondary" data-market="bonds" onclick="selectMarket('bonds')">Bonds</button>
      <button class="secondary" data-market="bond" onclick="selectMarket('bond')">Bond</button>
      <button class="secondary" data-market="economics2" onclick="selectMarket('economics2')">Economy</button>
      <button class="secondary" data-market="options" onclick="selectMarket('options')">Options</button>
    </div>
  </section>

  <!-- Columns -->
  <section>
    <h3>Columns <small class="hint">(SELECT)</small></h3>
    <div class="chip-container" id="columns-container" onclick="document.getElementById('column-input').focus()">
      <input
        id="column-input"
        class="chip-input"
        type="text"
        list="column-suggestions"
        placeholder="Type a field name and press Enter..."
        autocomplete="off"
        onkeydown="handleColumnKeydown(event)"
      />
    </div>
    <datalist id="column-suggestions"></datalist>
    <small class="hint">Press <kbd>Enter</kbd> to add, or click &times; to remove.</small>
  </section>

  <!-- Filters -->
  <section>
    <h3>Filters <small class="hint">(WHERE)</small></h3>
    <div id="filters-container"></div>
    <button class="secondary" onclick="addFilterRow()">+ Add Filter</button>
  </section>

  <!-- Sort -->
  <section>
    <h3>Order By</h3>
    <div class="grid">
      <input
        id="sort-field"
        type="text"
        list="sort-suggestions"
        placeholder="Field name (leave empty to skip)"
        autocomplete="off"
        oninput="scheduleUpdate()"
      />
      <datalist id="sort-suggestions"></datalist>
      <select id="sort-dir" onchange="scheduleUpdate()">
        <option value="desc">Descending</option>
        <option value="asc">Ascending</option>
      </select>
    </div>
  </section>

  <!-- Limit / Offset -->
  <section>
    <div class="grid">
      <label>Limit
        <input type="number" id="limit" value="50" min="1" max="10000" oninput="scheduleUpdate()">
      </label>
      <label>Offset
        <input type="number" id="offset" value="0" min="0" oninput="scheduleUpdate()">
      </label>
    </div>
  </section>

  <!-- Output -->
  <section>
    <h3>Output</h3>
    <div class="tab-bar">
      <button aria-selected="true" onclick="showTab('python', this)">Python</button>
      <button aria-selected="false" onclick="showTab('json', this)">JSON Payload</button>
    </div>
    <div id="tab-python" class="code-wrapper">
      <button class="secondary copy-btn" onclick="copyCode('python-code')">Copy</button>
      <pre><code id="python-code" class="language-python"></code></pre>
    </div>
    <div id="tab-json" class="code-wrapper" style="display:none">
      <button class="secondary copy-btn" onclick="copyCode('json-code')">Copy</button>
      <pre><code id="json-code" class="language-json"></code></pre>
    </div>
  </section>

  <!-- Run -->
  <section>
    <button id="run-btn" onclick="runQuery()">&#9654; Run Query</button>
    <div id="run-status"></div>
    <div id="results-section" style="display:none">
      <h3>Results <small id="result-count" class="hint"></small></h3>
      <div id="results-table-wrapper"></div>
    </div>
  </section>
</main>

<script>
  // ── State ────────────────────────────────────────────────────────────────────
  let currentMarket = 'america';
  let availableFields = [];       // [{n, t, r}]
  let selectedColumns = [];       // string[]
  let filterIdCounter = 0;
  let updateTimer = null;

  const MARKET_TO_FILE = {
    america: 'stocks', crypto: 'crypto', forex: 'forex', coin: 'coin',
    cfd: 'cfd', futures: 'futures', bonds: 'bonds', bond: 'bond',
    economics2: 'economics2', options: 'options',
  };

  const OPERATORS = [
    { value: 'greater',        label: '>',           arity: 1 },
    { value: 'egreater',       label: '>=',          arity: 1 },
    { value: 'less',           label: '<',           arity: 1 },
    { value: 'eless',          label: '<=',          arity: 1 },
    { value: 'equal',          label: '==',          arity: 1 },
    { value: 'nequal',         label: '!=',          arity: 1 },
    { value: 'in_range',       label: 'between',     arity: 2 },
    { value: 'not_in_range',   label: 'not between', arity: 2 },
    { value: 'match',          label: 'like',        arity: 1 },
    { value: 'nmatch',         label: 'not like',    arity: 1 },
    { value: 'in_list',        label: 'in list',     arity: 'list' },
    { value: 'not_in_list',    label: 'not in list', arity: 'list' },
    { value: 'has',            label: 'has',         arity: 'list' },
    { value: 'has_none_of',    label: 'has none of', arity: 'list' },
    { value: 'empty',          label: 'is empty',    arity: 0 },
    { value: 'nempty',         label: 'is not empty',arity: 0 },
  ];

  // Map operator value → Python method
  const OP_TO_PY = {
    greater:      (f, v)  => `Column('${f}') > ${v[0]}`,
    egreater:     (f, v)  => `Column('${f}') >= ${v[0]}`,
    less:         (f, v)  => `Column('${f}') < ${v[0]}`,
    eless:        (f, v)  => `Column('${f}') <= ${v[0]}`,
    equal:        (f, v)  => `Column('${f}') == ${v[0]}`,
    nequal:       (f, v)  => `Column('${f}') != ${v[0]}`,
    in_range:     (f, v)  => `Column('${f}').between(${v[0]}, ${v[1]})`,
    not_in_range: (f, v)  => `Column('${f}').not_between(${v[0]}, ${v[1]})`,
    match:        (f, v)  => `Column('${f}').like(${JSON.stringify(v[0])})`,
    nmatch:       (f, v)  => `Column('${f}').not_like(${JSON.stringify(v[0])})`,
    in_list:      (f, v)  => `Column('${f}').isin([${v.map(x => JSON.stringify(x)).join(', ')}])`,
    not_in_list:  (f, v)  => `Column('${f}').not_in([${v.map(x => JSON.stringify(x)).join(', ')}])`,
    has:          (f, v)  => `Column('${f}').has([${v.map(x => JSON.stringify(x)).join(', ')}])`,
    has_none_of:  (f, v)  => `Column('${f}').has_none_of([${v.map(x => JSON.stringify(x)).join(', ')}])`,
    empty:        (f)     => `Column('${f}').empty()`,
    nempty:       (f)     => `Column('${f}').not_empty()`,
  };

  // ── Field loading ─────────────────────────────────────────────────────────────
  async function loadFields(market) {
    const file = MARKET_TO_FILE[market] || 'stocks';
    try {
      const resp = await fetch(`../data/metainfo/${file}.json`);
      if (!resp.ok) return [];
      return await resp.json();
    } catch {
      return [];
    }
  }

  function fieldNames() {
    return availableFields.map(f => f.n);
  }

  function updateDataLists() {
    const names = fieldNames();
    const html = names.map(n => `<option value="${escHtml(n)}">`).join('');
    document.getElementById('column-suggestions').innerHTML = html;
    document.getElementById('sort-suggestions').innerHTML = html;
    document.querySelectorAll('.filter-field-list').forEach(dl => {
      dl.innerHTML = html;
    });
  }

  // ── Market selection ──────────────────────────────────────────────────────────
  async function selectMarket(market) {
    currentMarket = market;
    document.querySelectorAll('#market-buttons button').forEach(btn => {
      const active = btn.dataset.market === market;
      btn.className = active ? 'primary' : 'secondary';
    });
    availableFields = await loadFields(market);
    updateDataLists();
    scheduleUpdate();
  }

  // ── Columns ───────────────────────────────────────────────────────────────────
  function handleColumnKeydown(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = e.target.value.trim();
      if (val && !selectedColumns.includes(val)) {
        selectedColumns.push(val);
        renderColumnChips();
        scheduleUpdate();
      }
      e.target.value = '';
    } else if (e.key === 'Backspace' && e.target.value === '' && selectedColumns.length > 0) {
      selectedColumns.pop();
      renderColumnChips();
      scheduleUpdate();
    }
  }

  function removeColumn(name) {
    selectedColumns = selectedColumns.filter(c => c !== name);
    renderColumnChips();
    scheduleUpdate();
  }

  function renderColumnChips() {
    const container = document.getElementById('columns-container');
    const input = document.getElementById('column-input');
    container.innerHTML = '';
    selectedColumns.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML = `${escHtml(name)} <button type="button" title="Remove" onclick="removeColumn('${escAttr(name)}')">&times;</button>`;
      container.appendChild(chip);
    });
    container.appendChild(input);
  }

  // ── Filters ───────────────────────────────────────────────────────────────────
  function addFilterRow() {
    const id = ++filterIdCounter;
    const listId = `filter-field-list-${id}`;
    const names = fieldNames();
    const datalistHtml = names.map(n => `<option value="${escHtml(n)}">`).join('');
    const opOptions = OPERATORS.map(op =>
      `<option value="${op.value}">${op.label}</option>`
    ).join('');

    const row = document.createElement('div');
    row.className = 'filter-row';
    row.id = `filter-row-${id}`;
    row.innerHTML = `
      <input type="text" list="${listId}" class="filter-field" placeholder="Field" autocomplete="off" oninput="onFilterChange(${id})">
      <datalist id="${listId}" class="filter-field-list">${datalistHtml}</datalist>
      <select class="filter-op" onchange="onFilterOpChange(${id})">
        ${opOptions}
      </select>
      <input type="text" class="filter-value" placeholder="Value" oninput="scheduleUpdate()">
      <button class="secondary remove-btn" onclick="removeFilter(${id})">&times;</button>
    `;
    document.getElementById('filters-container').appendChild(row);
    scheduleUpdate();
  }

  function removeFilter(id) {
    document.getElementById(`filter-row-${id}`).remove();
    scheduleUpdate();
  }

  function onFilterChange(id) {
    scheduleUpdate();
  }

  function onFilterOpChange(id) {
    const row = document.getElementById(`filter-row-${id}`);
    const op = row.querySelector('.filter-op').value;
    const opDef = OPERATORS.find(o => o.value === op);
    const valueInput = row.querySelector('.filter-value');

    if (opDef.arity === 0) {
      valueInput.style.display = 'none';
      valueInput.placeholder = '';
    } else if (opDef.arity === 2) {
      valueInput.style.display = '';
      valueInput.placeholder = 'min, max';
    } else if (opDef.arity === 'list') {
      valueInput.style.display = '';
      valueInput.placeholder = 'val1, val2, ...';
    } else {
      valueInput.style.display = '';
      valueInput.placeholder = 'Value';
    }
    scheduleUpdate();
  }

  function collectFilters() {
    const rows = document.querySelectorAll('.filter-row');
    const filters = [];
    rows.forEach(row => {
      const field = row.querySelector('.filter-field').value.trim();
      const op = row.querySelector('.filter-op').value;
      const rawVal = row.querySelector('.filter-value').value.trim();
      const opDef = OPERATORS.find(o => o.value === op);
      if (!field) return;

      let values = [];
      if (opDef.arity === 0) {
        values = [];
      } else if (opDef.arity === 2) {
        values = rawVal.split(',').map(s => s.trim()).filter(Boolean);
      } else if (opDef.arity === 'list') {
        values = rawVal.split(',').map(s => s.trim()).filter(Boolean);
      } else {
        values = [rawVal];
      }
      filters.push({ field, op, opDef, values });
    });
    return filters;
  }

  // ── Code generation ───────────────────────────────────────────────────────────
  function buildPayload() {
    const filters = collectFilters();
    const sortField = document.getElementById('sort-field').value.trim();
    const sortDir = document.getElementById('sort-dir').value;
    const limit = parseInt(document.getElementById('limit').value) || 50;
    const offset = parseInt(document.getElementById('offset').value) || 0;

    const payload = {
      markets: [currentMarket],
      symbols: { query: { types: [] }, tickers: [] },
      options: { lang: 'en' },
      columns: selectedColumns.length ? selectedColumns : ['name', 'close', 'volume'],
      range: [offset, limit],
    };

    if (sortField) {
      payload.sort = { sortBy: sortField, sortOrder: sortDir };
    }

    if (filters.length) {
      payload.filter = filters.map(f => {
        const opDef = f.opDef;
        let right;
        if (opDef.arity === 0) {
          right = undefined;
        } else if (opDef.arity === 2) {
          right = f.values.map(v => maybeNum(v));
        } else if (opDef.arity === 'list') {
          right = f.values.map(v => maybeNum(v));
        } else {
          right = maybeNum(f.values[0] ?? '');
        }
        const obj = { left: f.field, operation: f.op };
        if (right !== undefined) obj.right = right;
        return obj;
      });
    }

    return payload;
  }

  function buildPythonCode() {
    const filters = collectFilters();
    const sortField = document.getElementById('sort-field').value.trim();
    const sortDir = document.getElementById('sort-dir').value;
    const limit = parseInt(document.getElementById('limit').value) || 50;
    const offset = parseInt(document.getElementById('offset').value) || 0;

    const cols = selectedColumns.length ? selectedColumns : ['name', 'close', 'volume'];
    const colsStr = cols.map(c => `'${c}'`).join(', ');

    const lines = ['from tradingview_screener import Query, Column', ''];
    lines.push('count, df = (');
    lines.push(`    Query()`);

    if (currentMarket !== 'america') {
      lines.push(`    .set_markets('${currentMarket}')`);
    }

    lines.push(`    .select(${colsStr})`);

    if (filters.length) {
      if (filters.length === 1) {
        const f = filters[0];
        const py = buildFilterPy(f);
        if (py) lines.push(`    .where(${py})`);
      } else {
        lines.push(`    .where(`);
        filters.forEach((f, i) => {
          const py = buildFilterPy(f);
          if (py) lines.push(`        ${py}${i < filters.length - 1 ? ',' : ''}`);
        });
        lines.push(`    )`);
      }
    }

    if (sortField) {
      const asc = sortDir === 'asc';
      lines.push(`    .order_by('${sortField}', ascending=${asc ? 'True' : 'False'})`);
    }

    if (limit !== 50) lines.push(`    .limit(${limit})`);
    if (offset !== 0) lines.push(`    .offset(${offset})`);

    lines.push(`    .get_scanner_data()`);
    lines.push(')');
    lines.push('print(df)');

    return lines.join('\n');
  }

  function buildFilterPy(f) {
    const fn = OP_TO_PY[f.op];
    if (!fn) return null;
    try { return fn(f.field, f.values); } catch { return null; }
  }

  function maybeNum(s) {
    const n = Number(s);
    return (s !== '' && !isNaN(n)) ? n : s;
  }

  // ── UI updates ────────────────────────────────────────────────────────────────
  function scheduleUpdate() {
    clearTimeout(updateTimer);
    updateTimer = setTimeout(updateOutput, 80);
  }

  function updateOutput() {
    const pyCode = buildPythonCode();
    const payload = buildPayload();
    const jsonStr = JSON.stringify(payload, null, 2);

    const pyEl = document.getElementById('python-code');
    pyEl.textContent = pyCode;
    delete pyEl.dataset.highlighted;
    hljs.highlightElement(pyEl);

    const jsonEl = document.getElementById('json-code');
    jsonEl.textContent = jsonStr;
    delete jsonEl.dataset.highlighted;
    hljs.highlightElement(jsonEl);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────────
  function showTab(name, btn) {
    document.getElementById('tab-python').style.display = name === 'python' ? '' : 'none';
    document.getElementById('tab-json').style.display = name === 'json' ? '' : 'none';
    document.querySelectorAll('.tab-bar button').forEach(b => b.setAttribute('aria-selected', 'false'));
    btn.setAttribute('aria-selected', 'true');
  }

  // ── Copy ──────────────────────────────────────────────────────────────────────
  function copyCode(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
  }

  // ── Run query ─────────────────────────────────────────────────────────────────
  async function runQuery() {
    const statusEl = document.getElementById('run-status');
    const resultsSection = document.getElementById('results-section');
    const runBtn = document.getElementById('run-btn');

    runBtn.setAttribute('aria-busy', 'true');
    runBtn.disabled = true;
    statusEl.innerHTML = '';
    resultsSection.style.display = 'none';

    const payload = buildPayload();
    const market = payload.markets[0];
    const url = `https://scanner.tradingview.com/${market}/scan`;

    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
      }

      const data = await resp.json();
      const columns = payload.columns;
      const rows = (data.data || data.symbols || []).map(item => item.d || item.f || []);
      const total = data.totalCount ?? rows.length;

      document.getElementById('result-count').textContent = `(${rows.length} of ${total.toLocaleString()} total)`;

      const thead = `<thead><tr><th>#</th>${columns.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr></thead>`;
      const tbody = rows.map((row, i) =>
        `<tr><td>${i + 1}</td>${row.map(v => `<td>${escHtml(v == null ? '' : String(v))}</td>`).join('')}</tr>`
      ).join('');

      document.getElementById('results-table-wrapper').innerHTML =
        `<table id="results-table">${thead}<tbody>${tbody}</tbody></table>`;
      resultsSection.style.display = '';

    } catch (err) {
      const isCors = err instanceof TypeError && err.message.toLowerCase().includes('fetch');
      statusEl.innerHTML = `<div class="error-box">
        <strong>Error:</strong> ${escHtml(err.message)}<br>
        ${isCors ? '<small>This is likely a CORS restriction. Use the generated Python code to run the query locally instead.</small>' : ''}
      </div>`;
    } finally {
      runBtn.removeAttribute('aria-busy');
      runBtn.disabled = false;
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  (async () => {
    availableFields = await loadFields('america');
    updateDataLists();
    updateOutput();
  })();
</script>
</body>
</html>
